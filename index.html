<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>合同会社ウルラ</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Meiryo', 'メイリオ', sans-serif;
      font-size: 16px;
      font-weight: 400;
      line-height: 1.75;
      color: #333333;
      background-color: #FFFFFF;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 64px 16px;
    }

    .header {
      margin-bottom: 48px;
    }

    .header h1 {
      font-size: 32px;
      font-weight: 700;
      line-height: 1.4;
      color: #111111;
      margin-bottom: 8px;
    }

    .header .sub {
      font-size: 12px;
      font-weight: 400;
      color: #999999;
      line-height: 1.6;
    }

    .divider {
      height: 2px;
      background: #111111;
      margin: 32px 0;
    }

    .section {
      margin-bottom: 32px;
    }

    .section h2 {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.5;
      color: #333333;
      margin-bottom: 16px;
    }

    .info-table {
      width: 100%;
      border-collapse: collapse;
      border: 2px solid #111111;
    }

    .info-table tr {
      border-bottom: 1px solid #E0E0E0;
    }

    .info-table tr:last-child {
      border-bottom: none;
    }

    .info-table th {
      background: #111111;
      color: #FFFFFF;
      font-size: 14px;
      font-weight: 700;
      text-align: left;
      padding: 12px 16px;
      width: 140px;
      vertical-align: top;
    }

    .info-table td {
      font-size: 14px;
      font-weight: 400;
      color: #333333;
      padding: 12px 16px;
      vertical-align: top;
    }

    .info-table td ul {
      list-style: none;
      padding: 0;
    }

    .info-table td ul li {
      padding: 2px 0;
    }

    .info-table td ul li::before {
      content: "—";
      color: #999999;
      margin-right: 8px;
    }

    .footer {
      margin-top: 48px;
      padding-top: 16px;
      border-top: 1px solid #E0E0E0;
    }

    .footer p {
      font-size: 12px;
      color: #999999;
      line-height: 1.6;
    }

    @media (max-width: 480px) {
      .container {
        padding: 40px 16px;
      }

      .header h1 {
        font-size: 24px;
      }

      .info-table th {
        display: block;
        width: 100%;
      }

      .info-table td {
        display: block;
        width: 100%;
        padding-top: 4px;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <header class="header">
      <h1>合同会社ウルラ</h1>
      <p class="sub">ULULA LLC</p>
    </header>

    <div class="divider"></div>

    <section class="section">
      <h2>会社概要</h2>
      <table class="info-table">
        <tr>
          <th>商号</th>
          <td>合同会社ウルラ</td>
        </tr>
        <tr>
          <th>所在地</th>
          <td>東京都新宿区西新宿三丁目3番13号<br>西新宿水間ビル6階</td>
        </tr>
        <tr>
          <th>代表社員</th>
          <td>松重 武嘉</td>
        </tr>
        <tr>
          <th>設立</th>
          <td>2022年2月2日</td>
        </tr>
        <tr>
          <th>事業内容</th>
          <td>
            <ul>
              <li>各種コンサルティング事業</li>
              <li>投資事業</li>
              <li>美容サロン事業</li>
              <li>前各号に附帯関連する一切の事業</li>
            </ul>
          </td>
        </tr>
        <tr>
          <th>法人番号</th>
          <td>1010903007131</td>
        </tr>
      </table>
    </section>

    <div class="divider"></div>

    <footer class="footer">
      <p>&copy; 合同会社ウルラ</p>
    </footer>

  </div>
</body>
</html>
